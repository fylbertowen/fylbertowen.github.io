<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Memory Game — BAEUDA</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .grid-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .card-m {
      background: var(--card);
      border-radius: 12px;
      aspect-ratio: 1;
      display: block;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid var(--border);
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
      transform-style: preserve-3d;
      transition: transform .45s cubic-bezier(.2,.9,.2,1);
    }

    .card-m-inner {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transition: transform .45s cubic-bezier(.2,.9,.2,1);
    }

    .card-m.flipped .card-m-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-front {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      font-size: 2rem;
      color: var(--muted);
    }

    .card-back {
      transform: rotateY(180deg);
      background: var(--card);
    }

    .card-back img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display:block;
    }

    .card-label {
      position: absolute;
      left: 8px;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.45);
      color: #fff;
      padding: 6px 8px;
      border-radius: 8px;
      font-size: .85rem;
      text-align: center;
      display: none;
    }

    .card-m.matched {
      border-color: var(--brand);
      box-shadow: 0 10px 30px rgba(78,123,254,.18);
      transform: scale(1.02);
    }

    .card-m.matched .card-label { display:block; }

    /* responsive */
    @media (max-width:720px) {
      .grid-cards { grid-template-columns: repeat(3,1fr); gap:10px; }
    }
    @media (max-width:420px) {
      .grid-cards { grid-template-columns: repeat(2,1fr); gap:8px; }
    }
  </style>
</head>
<body>
  <main class="container" style="max-width:820px;margin:40px auto;">
    <div class="card" style="padding:2em;">
      <div class="badge">Memory Card Game</div>
      <h3>Temukan Pasangan Ilmuwan Terkenal</h3>
      <div id="grid" class="grid-cards" style="margin-top:1em;"></div>
      <div id="mem-status" style="margin-top:1em;color:var(--muted)"></div>
      <button class="btn" id="mem-restart" style="margin-top:1em;">Mulai Ulang</button>
    </div>
  </main>

  <script>
    // remote image URLs can be blocked by some hosts. For reliable results download assets locally
    // and set img paths to "images/einstein.jpg" etc. Also add "images/placeholder.png".
    const scientists = [
      { name: "Einstein", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Einstein_1921_by_F_Schmutzer_-_restoration.jpg/800px-Einstein_1921_by_F_Schmutzer_-_restoration.jpg" },
      { name: "Newton",   img: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/39/GodfreyKneller-IsaacNewton-1689.jpg/800px-GodfreyKneller-IsaacNewton-1689.jpg" },
      { name: "Tesla",    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/79/Tesla_circa_1890.jpeg/800px-Tesla_circa_1890.jpeg" },
      { name: "Curie",    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Marie_Curie_c1920.jpg/800px-Marie_Curie_c1920.jpg" },
      { name: "Darwin",   img: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Charles_Darwin_seated_crop.jpg/800px-Charles_Darwin_seated_crop.jpg" },
      { name: "Hawking",  img: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Stephen_Hawking.StarChild.jpg/800px-Stephen_Hawking.StarChild.jpg" },
      { name: "Galileo",  img: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Justus_Sustermans_-_Portrait_of_Galileo_Galilei%2C_1636.jpg/800px-Justus_Sustermans_-_Portrait_of_Galileo_Galilei%2C_1636.jpg" },
      { name: "Bohr",     img: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Niels_Bohr.jpg/800px-Niels_Bohr.jpg" }
    ];

    const PLACEHOLDER = 'images/placeholder.png'; // create or add a small local placeholder image
    let deck = [], first = null, second = null, lock = false, matches = 0;

    // build deck (duplicates + shuffle)
    function buildDeck() {
      deck = [...scientists, ...scientists].map((s, i) => ({ ...s, idx: i }));
      // Fisher–Yates shuffle
      for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
      }
    }

    function createCardHTML(item, index) {
      // data-pos maps to current deck index so comparisons use deck[pos].name
      return `
        <div class="card-m" data-pos="${index}">
          <div class="card-m-inner">
            <div class="card-face card-front">?</div>
            <div class="card-face card-back">
              <img data-src="${item.img}" alt="${item.name}">
              <div class="card-label">${item.name}</div>
            </div>
          </div>
        </div>
      `;
    }

    function init() {
      buildDeck();
      first = null; second = null; lock = false; matches = 0;
      const grid = document.getElementById('grid');
      grid.innerHTML = deck.map((d,i) => createCardHTML(d,i)).join('');
      // attach listeners and setup images with error fallback
      document.querySelectorAll('#grid .card-m').forEach(el => {
        el.addEventListener('click', () => flip(el));
        const img = el.querySelector('img');
        // set src after DOM to avoid some hotlink blockers; add onerror fallback
        const src = img.dataset.src;
        img.src = src;
        img.onerror = () => {
          // fallback to local placeholder if remote fails
          img.src = PLACEHOLDER;
        };
      });
      document.getElementById('mem-status').textContent = `Pasangan ditemukan: ${matches}`;
    }

    function flip(el) {
      if (lock || el.classList.contains('matched') || el === first) return;
      el.classList.add('flipped');

      const pos = Number(el.dataset.pos);
      if (!first) {
        first = el;
      } else {
        second = el;
        lock = true;
        const a = deck[Number(first.dataset.pos)].name;
        const b = deck[pos].name;
        if (a === b) {
          // match
          first.classList.add('matched');
          second.classList.add('matched');
          matches++;
          // reveal labels for matched cards
          first.querySelector('.card-label').style.display = 'block';
          second.querySelector('.card-label').style.display = 'block';
          resetTurn();
          if (matches === scientists.length) {
            document.getElementById('mem-status').textContent = "Selesai! Kamu telah menemukan semua pasangan ilmuwan!";
          }
        } else {
          // not a match -> flip back
          setTimeout(() => {
            first.classList.remove('flipped');
            second.classList.remove('flipped');
            resetTurn();
          }, 900);
        }
        document.getElementById('mem-status').textContent = `Pasangan ditemukan: ${matches}`;
      }
    }

    function resetTurn(){
      first = null; second = null; lock = false;
    }

    document.getElementById('mem-restart').addEventListener('click', init);

    // init on load
    init();

    // Helpful note: if remote images still fail, download the images into /images/ and replace the scientist.img strings
    // with local paths like 'images/einstein.jpg' and ensure PLACEHOLDER file exists.
  </script>
</body>
</html>
